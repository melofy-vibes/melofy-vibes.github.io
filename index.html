    height: 300px;
    background: rgba(56, 189, 248, 0.3);

    left: -100px;

    height: 400px;
    background: rgba(139, 92, 246, 0.25);

    right: -150px;
    animation-delay: 5s;
}

.light:nth-child(3) {
    width: 250px;
    height: 250px;
    background: rgba(236, 72, 153, 0.2);
    top: 50%;
    left: 50%;
    animation-delay: 10s;
}

    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -30px) scale(1.1); }
    66% { transform: translate(-20px, 20px) scale(0.9); }

    container.innerHTML = projectsData.map(project => {
        const title = currentLang === 'fa' ? project.faTitle : project.enTitle;
        const desc = currentLang === 'fa' ? project.faDesc : project.enDesc;
        const viewText = currentLang === 'fa' ? translations.fa.viewProject : translations.en.viewProject;
        return `
            <div class="card">
                <h3>${project.icon} ${title}</h3>
                <p>${desc}</p>
                <a href="${project.link}" target="_blank" class="project-link">${viewText}</a>
            </div>
        `;
    }).join('');
}

function renderSkills() {
    const container = document.getElementById('skillsGrid');
    if (!container) return;
    
    container.innerHTML = skillsData.map(skill => {
        const title = currentLang === 'fa' ? skill.faTitle : skill.enTitle;
        const desc = currentLang === 'fa' ? skill.faDesc : skill.enDesc;
        return `
            <div class="card">
                <h3>${title}</h3>
                <p>${desc}</p>
            </div>
        `;
    }).join('');
}

function renderCertificates() {
    const container = document.getElementById('certificatesGrid');
    if (!container) return;
    
    container.innerHTML = certificatesData.map((cert, index) => {
        const title = currentLang === 'fa' ? cert.faTitle : cert.enTitle;
        const desc = currentLang === 'fa' ? cert.faDesc : cert.enDesc;
        const caption = title;
        
        return `
            <div class="cert-card" data-cert-index="${index}" onclick="openModal('${cert.imgSrc}', '${caption.replace(/'/g, "\\'")}')">
                <div class="cert-image">
                    <img src="${cert.imgSrc}" alt="${title}" onerror="this.parentElement.innerHTML='<div class=\\'placeholder-img\\'><div>${cert.icon}</div><span>${title}</span></div>'">
                </div>
                <h3>${title}</h3>
                <p>${desc}</p>
            </div>
        `;
    }).join('');
}

function updateTextContent() {
    const t = translations[currentLang];
    const elements = document.querySelectorAll('[data-i18n]');
    elements.forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key] !== undefined) {
            if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                el.placeholder = t[key];
            } else {
                el.innerHTML = t[key];
            }
        }
    });
}

function updateLanguage() {
    const body = document.body;
    const langBtn = document.querySelector('[data-lang-toggle]');
    
    if (currentLang === 'fa') {
        body.classList.remove('ltr-mode');
        body.setAttribute('dir', 'rtl');
        if (langBtn) langBtn.textContent = 'English';
    } else {
        body.classList.add('ltr-mode');
        body.setAttribute('dir', 'ltr');
        if (langBtn) langBtn.textContent = 'فارسی';
    }
    
    updateTextContent();
    renderProjects();
    renderSkills();
    renderCertificates();
    
    // Reset and restart typing animation with new roles
    if (typingTimeoutId) clearTimeout(typingTimeoutId);
    if (typingIntervalId) clearInterval(typingIntervalId);
    roleIndex = 0;
    charIndex = 0;
    isDeleting = false;
    if (typingElement) typingElement.textContent = '';
    startTypingAnimation();
}

// ==================== TYPING ANIMATION ====================
let typingElement = document.getElementById("typing");
let roles = [...translations.fa.typingRoles];
let roleIndex = 0, charIndex = 0;
let isDeleting = false;
let typingTimeoutId = null;
let typingIntervalId = null;

function typeEffect() {
    if (!typingElement) return;
    
    const currentRole = roles[roleIndex];
    if (isDeleting) {
        typingElement.textContent = currentRole.substring(0, charIndex - 1);
        charIndex--;
        if (charIndex === 0) {
            isDeleting = false;
            roleIndex = (roleIndex + 1) % roles.length;
            typingTimeoutId = setTimeout(typeEffect, 500);
            return;
        }
    } else {
        typingElement.textContent = currentRole.substring(0, charIndex + 1);
        charIndex++;
        if (charIndex === currentRole.length) {
            isDeleting = true;
            typingTimeoutId = setTimeout(typeEffect, 2000);
            return;
        }
    }
    typingTimeoutId = setTimeout(typeEffect, isDeleting ? 60 : 100);
}

function startTypingAnimation() {
    if (typingTimeoutId) clearTimeout(typingTimeoutId);
    roles = currentLang === 'fa' ? [...translations.fa.typingRoles] : [...translations.en.typingRoles];
    roleIndex = 0;
    charIndex = 0;
    isDeleting = false;
    if (typingElement) typingElement.textContent = '';
    typeEffect();
}

// ==================== PARTICLE BACKGROUND ====================
const canvas = document.getElementById('particles-canvas');
let ctx2d = canvas ? canvas.getContext('2d') : null;
let particles = [];
let animationId = null;

function resizeCanvas() {
    if (!canvas) return;
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

class Particle {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 3 + 1;
        this.speedX = (Math.random() - 0.5) * 0.5;
        this.speedY = (Math.random() - 0.5) * 0.5;
        this.color = `rgba(56, 189, 248, ${Math.random() * 0.5 + 0.2})`;
    }
    
    update() {
        this.x += this.speedX;
        this.y += this.speedY;
        
        if (this.x < 0) this.x = canvas.width;
        if (this.x > canvas.width) this.x = 0;
        if (this.y < 0) this.y = canvas.height;
        if (this.y > canvas.height) this.y = 0;
    }
    
    draw() {
        if (!ctx2d) return;
        ctx2d.beginPath();
        ctx2d.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx2d.fillStyle = this.color;
        ctx2d.fill();
    }
}

function initParticles() {
    if (!canvas) return;
    particles = [];
    const particleCount = Math.min(100, Math.floor(window.innerWidth * window.innerHeight / 15000));
    for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
    }
}

function animateParticles() {
    if (!ctx2d || !canvas) return;
    ctx2d.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(particle => {
        particle.update();
        particle.draw();
    });
    animationId = requestAnimationFrame(animateParticles);
}

function initParticleSystem() {
    if (!canvas) return;
    ctx2d = canvas.getContext('2d');
    resizeCanvas();
    initParticles();
    animateParticles();
}

// ==================== MODAL FUNCTIONS ====================
function openModal(imgSrc, caption) {
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImage');
    const modalCaption = document.getElementById('modalCaption');
    if (modal && modalImg && modalCaption) {
        modal.style.display = 'flex';
        modalImg.src = imgSrc;
        modalCaption.textContent = caption;
    }
}

function closeModal() {
    const modal = document.getElementById('imageModal');
    if (modal) modal.style.display = 'none';
}

// ==================== LANGUAGE TOGGLE ====================
function toggleLanguage() {
    currentLang = currentLang === 'fa' ? 'en' : 'fa';
    updateLanguage();
}

// ==================== INITIALIZATION ====================
document.addEventListener('DOMContentLoaded', () => {
    initParticleSystem();
    window.addEventListener('resize', () => {
        resizeCanvas();
        initParticles();
    });
    
    // Set up language toggle button
    const langBtn = document.querySelector('[data-lang-toggle]');
    if (langBtn) {
        langBtn.onclick = toggleLanguage;
    }
    
    // Initial render
    currentLang = 'fa';
    updateTextContent();
    renderProjects();
    renderSkills();
    renderCertificates();
    startTypingAnimation();
});
</script>
